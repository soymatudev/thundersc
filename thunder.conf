server {
    listen 80;
    server_name _; # Puedes cambiar esto por tu dominio o IP estática

    root /var/www/thundersc/client/dist;
    index index.html;

    # Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend Proxy
    location /api/ {
        proxy_pass http://localhost:4000/; # El puerto 4000 configurado en PM2
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Ajustes de Timeouts para evitar desconexiones en procesos largos
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Sockets (opcional, si usas socket.io en /socket.io)
    location /socket.io/ {
        proxy_pass http://localhost:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Logging
    error_log /var/log/nginx/thundersc_error.log;
    access_log /var/log/nginx/thundersc_access.log;
}
