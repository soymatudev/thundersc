<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Pestañas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
  <div class="container">
    <h1>Generador de Pestañas</h1>

    <div class="mb-3">
      <button id="agregarTab" class="btn btn-primary">Agregar Pestaña</button>
    </div>

    <ul class="nav nav-tabs" id="misPestañas">
      </ul>

    <div class="tab-content" id="contenidoPestañas">
      </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
  <script>
    // Inicializar variables
    let idPestaña = 1;

    // Función para agregar una nueva pestaña
    function agregarTab() {
      // ... (código para crear la pestaña, igual que antes)
    }

    // Función para eliminar una pestaña
    function eliminarTab(id) {
      // Eliminar elementos del DOM
      const pestañas = document.getElementById('misPestañas');
      const elementoPestaña = pestañas.querySelector(`li[data-bs-target="#tab-${id}"]`);
      if (elementoPestaña) {
        pestañas.removeChild(elementoPestaña);
      }
      const contenido = document.getElementById('contenidoPestañas');
      const elementoContenido = contenido.querySelector(`#tab-${id}`);
      if (elementoContenido) {
        contenido.removeChild(elementoContenido);
      }

      // Reordenar las pestañas existentes
      const pestañasRestantes = pestañas.querySelectorAll('li');
      if (pestañasRestantes.length > 0) {
        const primeraPestaña = pestañasRestantes[0];
        const primeraPestañaID = parseInt(primeraPestaña.querySelector('a').href.split('-').pop());
        const primeraPestañaContenido = contenido.querySelector(`#tab-${primeraPestañaID}`);
        primeraPestaña.querySelector('a').classList.add('active');
        primeraPestañaContenido.classList.add('show', 'active');
      }
    }

    // Agregar eventos de clic para eliminar pestañas
    function agregarEventosEliminar() {
      const pestañas = document.getElementById('misPestañas');
      pestañas.addEventListener('click', function(event) {
        const elementoPestaña = event.target.closest('li');
        if (elementoPestaña && elementoPestaña.classList.contains('nav-item')) {
          const idPestaña = parseInt(elementoPestaña.querySelector('a').href.split('-').pop());
          eliminarTab(idPestaña);
        }
      });
    }

    // Agregar evento de clic al botón "Agregar Pestaña"
    const botonAgregar = document.getElementById('agregarTab');
    botonAgregar.addEventListener('click', agregarTab);

    // Inicializar al cargar la página
    agregarEventosEliminar();
    agregarTab(); // Agregar una pestaña inicial
  </script>
</body>
</html>
