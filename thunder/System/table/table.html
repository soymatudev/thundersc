              tabindex="-1"

          </div>
          <div class="container-c-g">
            <p class="label-c-g">Lote:</p>
            <input
              type="text"
              class="form_input bordes_redondeados input-area"
              name="lote"
              id="inputLote"
            />
          </div>
          <div class="container-c-g">
            <p class="label-c-g">Archivo:</p>
            <input type="file" class="btn-file" id="file" name="file" />
          </div>

          <div class="container-c-g">
            <button
              class="bordes_redondeados shadow btn_consult btn"
              id="btnAdd"
            >
              Agregar
            </button>
          </div>
        </div>

              type="button"
